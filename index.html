<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenement Museum 7A</title>
    <script src="js/lib/p5.min.js"></script>
    <script src="js/lib/aframe.min.js"></script>
    <script src="js/p5.sound.min.js"></script>
    <script src="https://craignyu.github.io/aframep5/libraries/aframep5-v2.3.js"></script>
    <script src="js/sketch.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script type="module">
        import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js';
        window.Pane = Pane;
    </script>
</head>

<body>
    <div id="ui-layer">
        <h1 id="title">TENEMENT MUSEUM 7A</h1>
        <h2 id="text-loading">LOADING...</h2>
        <button id="btn-start" aria-label="Start experience">▶</button>
    </div>
    <!-- container to hold our VR scene - make sure to give this element an ID of 'VRScene' -->
    <a-scene id="VRScene">

        <a-assets id="VRAssets">
            <img id="placeholderImage" src="images/placeholderImage.png">
            <a-asset-item id="apartment" src="7A/scene.gltf"></a-asset-item>
        </a-assets>

        <a-entity id="main-camera" camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>

    <!--div id="minimap-container">
        <img src="images/floorPlan.jpg" alt="Floor Plan" id="minimap-image">
    </div-->
</body>

</html>
