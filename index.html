<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenement Museum 7A</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/p5.min.js"></script>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://craignyu.github.io/aframep5/libraries/aframep5-v2.3.js"></script>
    <script src="js/sketch.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script type="module">
        // import the library as a module
        import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js';
        // then, add it to the "browser" so that it can be used as "global."
        window.Pane = Pane;
    </script>
</head>

<body>
    <!-- container to hold our VR scene - make sure to give this element an ID of 'VRScene' -->
    <a-scene id="VRScene">

        <a-assets id="VRAssets">
            <img id="placeholderImage" src="images/placeholderImage.png">
        </a-assets>

        <a-gltf-model id="apartment" src="7A/scene.gltf"></a-gltf-model>

    </a-scene>

    <!--div id="minimap-container">
        <img src="images/floorPlan.jpg" alt="Floor Plan" id="minimap-image">
    </div-->
</body>

</html>
